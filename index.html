
<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        label {
            font-size: 20px;
            font-weight: bold;
            color: darkblue;
        }
        input {
            font-size: 18px;
            padding:10px;
            border: 2px solid;
            border-color:grey;
            background-color:white;
            border-radius: 5px;
            outline: blue; 
            transition: 0.3s;
        }
        input:focus {
            border-color: rgb(49, 46, 49);
            box-shadow: 0 0 20px rgb(58, 55, 58);
        }
        input[type="submit"] {
            font-size: 18px;
            padding: 10px 20px;
            background-color:pink;
            color: white;
            border-radius: 5px;
            cursor:grab;
        }
        input[type="submit"]:hover {
            background-color: green;
        }
        .div1{
            display:inline-block;
            background-color:  rgb(149, 147, 147);
            padding:100px;
            text-align:center;
            border: 3px solid lightgray;
            backdrop-filter:blur(30px);
            border-radius: 50px;
        }
        .for
        {
            text-align:right;
            font-size:20px;
            color:black;
        }
        button{
            background-color:yellow;
            border-radius:5px;
            font-size:20px;
        }
        button:hover{
            background-color:grey;
            cursor:pointer;
        }
        body{
            background-size:cover;
        }
    </style>
</head>
<center>
<body style="background-color:rgb(37, 33, 33)">
<h2 style="color:yellow;"> Login</h2>
<div class="div1">
    <form method="POST" action="/">
    <label for="username">Enter email or phno:</label><br>
    <input type="email" id="username"placeholder="email or phone number" name="useremail" required><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="password" required><br><br>
   <button type="submit" onclick="func()">login</button>
</form>
</div>
</body>
</center>
</html>
